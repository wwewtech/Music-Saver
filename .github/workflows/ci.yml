name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Validate imports and TOML config
        run: |
          python -c "from src.app_config import APP_NAME, DEFAULT_SETTINGS; print(APP_NAME); print(sorted(DEFAULT_SETTINGS))"
          python -m compileall main.py src