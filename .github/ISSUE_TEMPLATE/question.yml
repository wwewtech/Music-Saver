name: Question / Discussion
description: Задать вопрос или обсудить использование приложения
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Если что-то непонятно или вы хотите обсудить сценарий использования — добро пожаловать.

  - type: textarea
    id: question
    attributes:
      label: Ваш вопрос
      description: Опишите, что вас интересует
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Контекст
      description: Что вы уже пробовали? Какая у вас ситуация?
    validations:
      required: false
